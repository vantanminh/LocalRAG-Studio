<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <link rel="stylesheet" href="/static/chat.css" />
</head>
<body>
  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">RAG Chat</span>
        <button class="btn-new" id="new-chat-btn">+ New</button>
      </div>
      <div class="session-list" id="session-list">
        <div class="session-empty">No chats yet.</div>
      </div>
      <div class="sidebar-footer">
        <a href="/" class="back-link">← RAG Tool</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="chat-main">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">💬</div>
          <h2>Bắt đầu cuộc trò chuyện</h2>
          <p>Hỏi bất kỳ điều gì về tài liệu đã upload.</p>
        </div>
      </div>

      <div class="input-bar">
        <textarea
          id="chat-input"
          placeholder="Nhập câu hỏi… (Enter gửi · Shift+Enter xuống dòng)"
          rows="1"
        ></textarea>
        <button id="send-btn" class="btn-send" title="Gửi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </main>

  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
