<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <link rel="stylesheet" href="/static/chat.css" />
</head>
<body>
  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">RAG Chat</span>
        <button class="btn-new" id="new-chat-btn">+ New</button>
      </div>
      <div class="session-list" id="session-list">
        <div class="session-empty">No chats yet.</div>
      </div>
      <div class="sidebar-footer">
        <a href="/" class="back-link">← RAG Tool</a>
        <a href="/projects-page" class="back-link" style="margin-top:4px;">📁 Projects</a>
        <a href="#" id="project-back-link" class="back-link" style="display:none; margin-top:4px;">← Project</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="chat-main">
      <!-- Project context banner (shown when ?project_id= is in URL) -->
      <div id="project-banner" style="display:none; align-items:center; gap:0.6rem; padding:0.55rem 1rem; background:#eef2ff; border-bottom:1px solid #c7d2fe; font-size:0.85rem; flex-shrink:0;">
        <span>📂</span>
        <span class="banner-name" style="font-weight:600;"></span>
        <span style="color:#888;">— chỉ tìm kiếm trong project này</span>
      </div>
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">💬</div>
          <h2>Bắt đầu cuộc trò chuyện</h2>
          <p>Hỏi bất kỳ điều gì về tài liệu đã upload.</p>
        </div>
      </div>

      <div class="ctx-bar" id="ctx-bar" style="display:none;">
        <div class="ctx-top">
          <span class="ctx-label">Context</span>
          <span id="ctx-tokens" class="ctx-tokens">—</span>
          <span class="ctx-sep">/</span>
          <span id="ctx-limit" class="ctx-limit">—</span>
          <span class="ctx-unit">tokens</span>
          <span id="ctx-pct" class="ctx-pct">—</span>
          <button class="ctx-new-btn" id="ctx-new-btn" style="display:none;">Chat mới →</button>
        </div>
        <div class="ctx-track">
          <div class="ctx-fill" id="ctx-fill"></div>
        </div>
      </div>

      <div class="input-bar">
        <textarea
          id="chat-input"
          placeholder="Nhập câu hỏi… (Enter gửi · Shift+Enter xuống dòng)"
          rows="1"
        ></textarea>
        <button id="send-btn" class="btn-send" title="Gửi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </main>

  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
