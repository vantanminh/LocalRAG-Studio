<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Qwen Local</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>RAG Qwen Local</h1>
      <p class="subtitle">Upload documents, then ask questions about them.</p>
    </header>

    <!-- Upload Section -->
    <section class="card" id="upload-section">
      <h2>1. Add Document</h2>

      <div class="tabs">
        <button class="tab-btn active" data-tab="file-tab">Upload File</button>
        <button class="tab-btn" data-tab="paste-tab">Paste Text</button>
      </div>

      <!-- File tab -->
      <div id="file-tab" class="tab-panel">
        <p class="hint">Supported: .txt, .pdf, .docx</p>
        <div class="file-row">
          <label class="file-label" for="file-input">Choose file</label>
          <input type="file" id="file-input" accept=".txt,.pdf,.docx" />
          <span id="file-name" class="file-name">No file chosen</span>
        </div>
        <button id="upload-btn" class="btn">Upload &amp; Index</button>
      </div>

      <!-- Paste tab -->
      <div id="paste-tab" class="tab-panel hidden">
        <p class="hint">Paste any text — it will be saved as a .txt file and indexed.</p>
        <input
          type="text"
          id="paste-filename"
          placeholder="Filename (e.g. notes)"
          class="text-input"
          maxlength="80"
        />
        <textarea
          id="paste-content"
          placeholder="Paste your text here…"
          rows="7"
        ></textarea>
        <button id="paste-btn" class="btn">Index Text</button>
      </div>

      <div id="upload-status" class="status hidden"></div>
    </section>

    <!-- Indexed Files Section -->
    <section class="card" id="files-section">
      <h2>Indexed Files</h2>
      <ul id="files-list" class="files-list">
        <li class="files-empty">No files indexed yet.</li>
      </ul>
    </section>

    <!-- Ask Section -->
    <section class="card" id="ask-section">
      <h2>2. Ask a Question</h2>
      <textarea
        id="question-input"
        placeholder="Type your question here..."
        rows="3"
      ></textarea>
      <button id="ask-btn" class="btn">Ask</button>
      <div id="ask-status" class="status hidden"></div>
    </section>

    <!-- Answer Section -->
    <section class="card" id="answer-section" style="display:none;">
      <h2>Answer</h2>
      <div id="answer-text" class="answer-box"></div>

      <h3>Sources</h3>
      <ul id="sources-list" class="sources-list"></ul>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
